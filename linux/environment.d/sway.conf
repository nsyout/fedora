# Environment variables for Sway / Wayland sessions
# Loaded by systemd before graphical session starts

# Ensure ~/.local/bin is in PATH (for ghostty, starship, lazygit, etc.)
PATH=${HOME}/.local/bin:${PATH}

# Flatpak app directories (so .desktop files show up in rofi)
XDG_DATA_DIRS=/var/lib/flatpak/exports/share:${HOME}/.local/share/flatpak/exports/share:${XDG_DATA_DIRS}

# GTK dark theme
GTK_THEME=Adwaita:dark

# Qt theme (follows GTK if qt5ct/qt6ct not installed)
QT_QPA_PLATFORMTHEME=gtk3

# Cursor size (ensures XWayland apps pick it up)
XCURSOR_SIZE=24

# Application compatibility
_JAVA_AWT_WM_NONREPARENTING=1
