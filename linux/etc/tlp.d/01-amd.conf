# TLP configuration for AMD AI 300 series
# Drop-in config — overrides /etc/tlp.conf defaults

# --- CPU ---
# amd-pstate-epp energy performance preference
# Values: default, performance, balance_performance, balance_power, power
CPU_ENERGY_PERF_POLICY_ON_AC=balance_performance
CPU_ENERGY_PERF_POLICY_ON_BAT=power

# CPU boost: on AC allow turbo, on battery disable to save power
CPU_BOOST_ON_AC=1
CPU_BOOST_ON_BAT=0

# Platform profile (AMD supports: low-power, balanced, performance)
PLATFORM_PROFILE_ON_AC=balanced
PLATFORM_PROFILE_ON_BAT=low-power

# --- AMD GPU (integrated) ---
AMDGPU_ABM_LEVEL_ON_AC=0
AMDGPU_ABM_LEVEL_ON_BAT=3

# --- Wi-Fi ---
WIFI_PWR_ON_AC=off
WIFI_PWR_ON_BAT=on

# --- PCIe ---
PCIE_ASPM_ON_AC=default
PCIE_ASPM_ON_BAT=powersupersave

# --- Runtime PM for PCI(e) devices ---
RUNTIME_PM_ON_AC=auto
RUNTIME_PM_ON_BAT=auto

# --- USB autosuspend ---
USB_AUTOSUSPEND=1

# --- Disk ---
DISK_DEVICES="nvme0n1"
DISK_APM_LEVEL_ON_AC="254"
DISK_APM_LEVEL_ON_BAT="128"
DISK_IOSCHED="none"

# --- Audio ---
SOUND_POWER_SAVE_ON_AC=1
SOUND_POWER_SAVE_ON_BAT=1
