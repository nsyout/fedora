# Volume key bindings (PipeWire/PulseAudio via pactl)
#
# Requires:     pulseaudio-utils
# Recommends:   libnotify

set $volume_notification_cmd command -v notify-send >/dev/null && \
        VALUE=$(pactl get-sink-volume @DEFAULT_SINK@ | grep -oP "\d+%" | head -1) && \
        MUTE=$(pactl get-sink-mute @DEFAULT_SINK@ | grep -oP "yes|no") && \
        notify-send -e -h string:x-canonical-private-synchronous:volume \
            -h "int:value:${VALUE%\%}" -t 800 \
            "Volume: ${VALUE}$([ "$MUTE" = "yes" ] && echo " [Muted]")"

# Allow volume controls even if the screen is locked. Resolve the XF86 symbols
# to keycodes when loading the config so firmware consumer-control keys do not
# depend on runtime keysym translation.
bindsym --locked --to-code {
    XF86AudioRaiseVolume exec 'pactl set-sink-volume @DEFAULT_SINK@ +5% && $volume_notification_cmd'
    XF86AudioLowerVolume exec 'pactl set-sink-volume @DEFAULT_SINK@ -5% && $volume_notification_cmd'
    XF86AudioMute        exec 'pactl set-sink-mute @DEFAULT_SINK@ toggle && $volume_notification_cmd'
    XF86AudioMicMute     exec pactl set-source-mute @DEFAULT_SOURCE@ toggle
}
