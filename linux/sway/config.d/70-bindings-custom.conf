# Lock screen
bindsym $mod+Shift+Escape exec loginctl lock-session

# Dismiss notification
bindsym $mod+n exec makoctl dismiss
bindsym $mod+Shift+n exec makoctl dismiss --all

# Switch to last focused workspace
bindsym $mod+Tab workspace back_and_forth

# System menu (theme, power, etc.)
bindsym $mod+Shift+q exec ~/.dotfiles/scripts/rofi-system-menu.sh

# Emoji picker
bindsym $mod+period exec ~/.dotfiles/scripts/rofi-emoji.sh
